<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Satellite Tracker</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛰️</text></svg>">
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Widgets/widgets.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" crossorigin="anonymous">
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Cesium.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/5.0.0/satellite.min.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="cesiumContainer"></div>

    <div id="mission-control-panel" class="glass-panel">

        <div class="mc-section mc-telemetry">
            <div class="hud-header">
                <span class="status-dot"></span>
                <span class="hud-title">Live Telemetry</span>
                <span class="hud-tag">SGP4</span>
            </div>

            <div class="metric-grid">
                <div class="metric">
                    <div class="metric-label">Latitude</div>
                    <div class="metric-row">
                        <span id="tel-lat" class="metric-value">--</span>
                        <span class="metric-unit">&deg;</span>
                    </div>
                </div>
                <div class="metric">
                    <div class="metric-label">Longitude</div>
                    <div class="metric-row">
                        <span id="tel-lon" class="metric-value">--</span>
                        <span class="metric-unit">&deg;</span>
                    </div>
                </div>
                <div class="metric">
                    <div class="metric-label">Altitude</div>
                    <div class="metric-row">
                        <span id="tel-alt" class="metric-value">--</span>
                        <span class="metric-unit">km</span>
                    </div>
                </div>
                <div class="metric">
                    <div class="metric-label">Velocity</div>
                    <div class="metric-row">
                        <span id="tel-vel" class="metric-value">--</span>
                        <span class="metric-unit">km/h</span>
                    </div>
                </div>
            </div>

            <div class="los-card">
                <div class="los-heading">Line of Sight</div>
                <div id="tel-los" class="value los-na">--</div>
            </div>

            <button id="camera-lock-btn" class="action-btn" type="button">LOCK CAMERA</button>
        </div>

        <div class="mc-divider"></div>

        <div class="mc-section mc-controls">
            <div class="ctrl-section">
                <span class="ctrl-label">Constellation</span>
                <select id="satellite-filter">
                    <option value="stations">Space Stations &amp; ISS</option>
                    <option value="starlink">Starlink</option>
                    <option value="gps-ops">GPS Operational</option>
                    <option value="weather">Weather Satellites</option>
                    <option value="iridium-NEXT">Iridium NEXT</option>
                </select>
            </div>

            <div class="ctrl-section">
                <span class="ctrl-label">Live Tracking</span>
                <div id="category-panel" class="ctrl-buttons">
                    <button id="btn-aviation" class="cat-btn cat-btn-aviation" data-category="aviation">Live Aviation (Europe)</button>
                </div>
            </div>

            <div class="ctrl-section">
                <span class="ctrl-label">Search</span>
                <input id="sat-search" type="text" placeholder="Search satellite..." autocomplete="off" spellcheck="false" />
            </div>

            <div class="ctrl-section">
                <span class="ctrl-label">Active Satellite</span>
                <select id="satellite-selector" disabled>
                    <option>Loading...</option>
                </select>
            </div>

            <div class="ctrl-section">
                <span class="ctrl-label">Orbit Preview</span>
                <div class="slider-row">
                    <input type="range" id="orbit-slider" min="1" max="10" value="1" step="1">
                    <span id="orbit-slider-value">1 Orbit</span>
                </div>
            </div>
        </div>

    </div>

    <div id="flight-info-panel" class="glass-panel hidden">
        <div class="info-header">
            <div class="info-header-left">
                <span class="info-tag">FLIGHT</span>
                <span id="info-callsign" class="info-callsign">--</span>
            </div>
            <button id="info-close" class="info-close" type="button" aria-label="Close">&times;</button>
        </div>
        <div class="info-grid">
            <div class="info-row">
                <span class="info-label">Altitude</span>
                <span class="info-value">
                    <span id="info-alt-m">--</span><span class="info-unit"> m</span>
                    <span class="info-sep">/</span>
                    <span id="info-alt-ft">--</span><span class="info-unit"> ft</span>
                </span>
            </div>
            <div class="info-row">
                <span class="info-label">Ground Speed</span>
                <span class="info-value">
                    <span id="info-gs-kt">--</span><span class="info-unit"> kt</span>
                    <span class="info-sep">/</span>
                    <span id="info-gs-kmh">--</span><span class="info-unit"> km/h</span>
                </span>
            </div>
            <div class="info-row">
                <span class="info-label">Heading</span>
                <span class="info-value"><span id="info-heading">--</span><span class="info-unit">&deg;</span></span>
            </div>
            <div class="info-row">
                <span class="info-label">Latitude</span>
                <span class="info-value"><span id="info-lat">--</span><span class="info-unit">&deg;</span></span>
            </div>
            <div class="info-row">
                <span class="info-label">Longitude</span>
                <span class="info-value"><span id="info-lon">--</span><span class="info-unit">&deg;</span></span>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
