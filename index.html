<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Satellite Tracker</title>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Cesium.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/5.0.0/satellite.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="cesiumContainer"></div>

    <div id="telemetry-panel" class="glass-panel">
        <div class="hud-header">
            <span class="status-dot"></span>
            <span class="hud-title">Live Telemetry</span>
            <span class="hud-tag">SGP4</span>
        </div>

        <div class="metric-grid">
            <div class="metric">
                <div class="metric-label">Latitude</div>
                <div class="metric-row">
                    <span id="tel-lat" class="metric-value">--</span>
                    <span class="metric-unit">&deg;</span>
                </div>
            </div>
            <div class="metric">
                <div class="metric-label">Longitude</div>
                <div class="metric-row">
                    <span id="tel-lon" class="metric-value">--</span>
                    <span class="metric-unit">&deg;</span>
                </div>
            </div>
            <div class="metric">
                <div class="metric-label">Altitude</div>
                <div class="metric-row">
                    <span id="tel-alt" class="metric-value">--</span>
                    <span class="metric-unit">km</span>
                </div>
            </div>
            <div class="metric">
                <div class="metric-label">Velocity</div>
                <div class="metric-row">
                    <span id="tel-vel" class="metric-value">--</span>
                    <span class="metric-unit">km/h</span>
                </div>
            </div>
        </div>

        <div class="los-card">
            <div class="los-heading">Line of Sight</div>
            <div id="tel-los" class="value los-na">--</div>
        </div>
    </div>

    <div id="control-panel" class="glass-panel">
        <div class="ctrl-section">
            <span class="ctrl-label">Constellation</span>
            <div id="category-panel" class="ctrl-buttons">
                <button class="cat-btn" data-category="stations">Space Stations</button>
                <button class="cat-btn" data-category="visual">100 Brightest</button>
                <button class="cat-btn" data-category="gps">GPS / Navstar</button>
            </div>
        </div>

        <div class="ctrl-divider"></div>

        <div class="ctrl-section ctrl-section-select">
            <span class="ctrl-label">Active Satellite</span>
            <select id="satellite-selector" disabled>
                <option>Loading...</option>
            </select>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
