<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Satellite Tracker</title>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Cesium.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/5.0.0/satellite.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="cesiumContainer"></div>
    <div id="category-panel">
        <span class="cat-label">CONSTELLATION</span>
        <button class="cat-btn" data-category="stations">Space Stations</button>
        <button class="cat-btn" data-category="visual">100 Brightest</button>
        <button class="cat-btn" data-category="gps">GPS / Navstar</button>
    </div>
    <div id="telemetry-panel">
        <h2>LIVE TELEMETRY</h2>
        <div class="selector-row">
            <select id="satellite-selector" disabled>
                <option>Loading...</option>
            </select>
        </div>
        <div class="row"><span class="label">LAT</span><span id="tel-lat" class="value">--</span><span class="unit">&deg;</span></div>
        <div class="row"><span class="label">LON</span><span id="tel-lon" class="value">--</span><span class="unit">&deg;</span></div>
        <div class="row"><span class="label">ALT</span><span id="tel-alt" class="value">--</span><span class="unit">km</span></div>
        <div class="row"><span class="label">VEL</span><span id="tel-vel" class="value">--</span><span class="unit">km/h</span></div>
        <div class="row los-row"><span class="label">LOS</span><span id="tel-los" class="value">--</span><span class="unit"></span></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
